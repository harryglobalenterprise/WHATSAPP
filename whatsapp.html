<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whatsapp</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/script.js"></script>
</head>

<body>
    <!-- logo tag -->
     <div class="logo">
       <img src="../image/logo.png" alt="logo">
     </div>
     <div class="center">
        <!-- login form -->

        <div class="login">

            <div class="line">
            <img src="../image/line.png" alt="line">
            </div>

            <div class="hero-text">
            <h4 class="hero">Download whatsapp for windows </h4>
            <p class="head">Get extra fearures like voice and video calling , screen sharing an more.</p>
            </div>

            <div class="download-button">
                <button type="button">Download <img src="../image/download.png" alt="download"></button>
            </div>

            <!-- first box closed -->
            </div>

            <div class="qr-tag">
                <div class="scan-para">
                    <p class="scan-to" >scan to login</p>
                    <div class="para">
                    <p>Scan the QR code with your phone's camera</p>
                    <p>Tap the link to open WhatsApp <img class="symbol" src="../image/symbol.png" alt="symbol"></p>
                    <p>Scan the QR code again to link to your account</p>
                    </div>
                    
                    <div class="help">
                        <p class="help">need help?
                            <img class="arrow" src="../image/upper-right-arrow.png" alt="arrow"></p>
                        <button class="check"><img class="check" src="../image/check.png" alt="check"></button>
                    </div>
                    </div>
                
                <!-- para closed -->
                 <div class="rightside">

                <div class="qr-code">
                    <img class="qr" src="../image/qr.jpeg" alt="qr-code">
                    </div>
                    <div class="loginwithphone">
                    <button type="button">log in with phone number ></button>
                    </div>
                    </div>
                    
                    
                  


            <!-- center -->
            </div>


               

            </form>
    
</body>
</html>
